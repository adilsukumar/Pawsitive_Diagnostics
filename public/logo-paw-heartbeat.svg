<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tilted Paw (rotated -45 degrees, northwest direction) -->
  <g transform="rotate(-45 50 50)">
    <!-- Main Pad -->
    <ellipse cx="50" cy="60" rx="18" ry="22" fill="currentColor"/>
    
    <!-- Top Left Toe -->
    <ellipse cx="32" cy="38" rx="8" ry="11" fill="currentColor"/>
    
    <!-- Top Middle Toe -->
    <ellipse cx="50" cy="32" rx="8" ry="11" fill="currentColor"/>
    
    <!-- Top Right Toe -->
    <ellipse cx="68" cy="38" rx="8" ry="11" fill="currentColor"/>
    
    <!-- Bottom Right Toe -->
    <ellipse cx="65" cy="52" rx="7" ry="10" fill="currentColor"/>
    
    <!-- Heartbeat Pattern in Palm -->
    <g transform="translate(50, 60)">
      <path d="M -8 0 L -6 0 L -4 -6 L -2 6 L 0 0 L 2 0 L 4 -4 L 6 4 L 8 0" 
            stroke="white" 
            stroke-width="2" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"
            opacity="0.9"/>
    </g>
  </g>
</svg>
